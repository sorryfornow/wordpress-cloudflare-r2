# ============================================
# Apache 虚拟主机配置
# Apache Virtual Host Configuration
# ============================================
#
# 这个文件定义了 Apache 如何处理 HTTP 请求
# This file defines how Apache handles HTTP requests
#
# ============================================

<VirtualHost *:80>
    # ----------------------------------------
    # 基本设置 / Basic Settings
    # ----------------------------------------
    
    # 管理员邮箱（错误页面显示）
    # Admin email (shown on error pages)
    ServerAdmin webmaster@localhost
    
    # 网站根目录
    # Website root directory
    # WordPress 文件所在位置
    # Location of WordPress files
    DocumentRoot /var/www/html

    # ----------------------------------------
    # 目录权限配置 / Directory Permission Config
    # ----------------------------------------
    <Directory /var/www/html>
        # Options 指令
        # Options directive
        #
        # Indexes: 允许目录列表（当没有 index 文件时）
        #          Allow directory listing (when no index file)
        #          生产环境建议关闭
        #          Recommend disabling in production
        #
        # FollowSymLinks: 允许符号链接
        #                 Allow symbolic links
        Options Indexes FollowSymLinks
        
        # AllowOverride 指令
        # AllowOverride directive
        #
        # All: 允许 .htaccess 文件覆盖所有配置
        #      Allow .htaccess to override all settings
        #
        # WordPress 的固定链接功能需要这个设置
        # WordPress permalinks require this setting
        #
        # .htaccess 示例 / .htaccess example:
        # RewriteEngine On
        # RewriteRule ^about-me/$ /index.php?pagename=about-me [L]
        AllowOverride All
        
        # Require 指令
        # Require directive
        #
        # all granted: 允许所有人访问
        #              Allow everyone to access
        Require all granted
    </Directory>

    # ----------------------------------------
    # 日志配置 / Log Configuration
    # ----------------------------------------
    
    # 错误日志
    # Error log
    # ${APACHE_LOG_DIR} 通常是 /var/log/apache2
    # ${APACHE_LOG_DIR} is usually /var/log/apache2
    ErrorLog ${APACHE_LOG_DIR}/error.log
    
    # 访问日志
    # Access log
    # combined 格式包含：IP、时间、请求、状态码、大小、来源、UA
    # combined format includes: IP, time, request, status, size, referer, UA
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # ----------------------------------------
    # PHP 处理配置 / PHP Processing Config
    # ----------------------------------------
    
    # 匹配所有 .php 文件
    # Match all .php files
    <FilesMatch \.php$>
        # 使用 PHP 处理器处理这些文件
        # Use PHP handler to process these files
        SetHandler application/x-httpd-php
    </FilesMatch>

</VirtualHost>

# ============================================
# 配置说明 / Configuration Notes
# ============================================
#
# 1. 这是默认虚拟主机配置
#    This is the default virtual host configuration
#    文件位置 / File location: /etc/apache2/sites-available/000-default.conf
#
# 2. WordPress 需要 mod_rewrite 模块
#    WordPress requires mod_rewrite module
#    启用命令 / Enable command: a2enmod rewrite
#
# 3. 如果需要 HTTPS，Cloudflare 会处理
#    If HTTPS is needed, Cloudflare handles it
#    容器只需要处理 HTTP
#    Container only needs to handle HTTP
#
# ============================================
